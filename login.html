<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventário Patrimonial — Login · 9º BPM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#080e12;--panel:#0c1a22;--border:#1a3a4a;
      --ac:#00e5b4;--ac2:#3d9bff;--red:#e74c3c;
      --txt:#cfe8f0;--txt2:#5a8090;
      --mono:'Share Tech Mono',monospace;
      --sans:'Rajdhani',sans-serif;
    }
    body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    /* Grid background */
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,180,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,180,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:0}
    /* Glows */
    .bg-glow{position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
    .bg-glow-1{top:-200px;left:-200px;background:radial-gradient(circle,rgba(0,229,180,.12),transparent 70%)}
    .bg-glow-2{bottom:-200px;right:-200px;background:radial-gradient(circle,rgba(61,155,255,.10),transparent 70%)}
    /* Wrap */
    .wrap{position:relative;z-index:1;width:100%;max-width:440px;padding:0 20px;animation:fadeIn .6s ease both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    /* Emblem */
    .emblem{text-align:center;margin-bottom:32px}
    .emblem-icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:inline-flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 40px rgba(0,229,180,.35),0 0 0 1px rgba(0,229,180,.2);margin-bottom:16px;animation:pulse 3s ease-in-out infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(0,229,180,.35),0 0 0 1px rgba(0,229,180,.2)}50%{box-shadow:0 0 60px rgba(0,229,180,.55),0 0 0 1px rgba(0,229,180,.4)}}
    .emblem-title{font-family:var(--sans);font-size:22px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--txt)}
    .emblem-unit{font-family:var(--mono);font-size:10px;color:var(--ac2);letter-spacing:3px;margin-top:2px}
    .emblem-sub{font-family:var(--mono);font-size:11px;color:var(--txt2);letter-spacing:2px;margin-top:4px}
    /* Panel */
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:32px;box-shadow:0 24px 64px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);position:relative;overflow:hidden}
    .panel::before{content:'';position:absolute;top:0;left:24px;right:24px;height:2px;background:linear-gradient(90deg,transparent,var(--ac),var(--ac2),transparent);border-radius:0 0 4px 4px}
    /* Status bar */
    .status-bar{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--txt2);margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);box-shadow:0 0 8px var(--ac);animation:blink 2s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .status-text{flex:1}
    .status-time{color:var(--ac2)}
    /* Form */
    .fgrp{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
    .flbl{font-family:var(--mono);font-size:10px;color:var(--txt2);letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
    .flbl::before{content:'//';color:var(--ac);font-size:11px}
    .finp-wrap{position:relative}
    .finp-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--txt2);font-size:14px;pointer-events:none}
    .finp{background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:6px;color:var(--txt);padding:12px 14px 12px 40px;font-family:var(--mono);font-size:15px;letter-spacing:1px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
    .finp::placeholder{color:var(--txt2);font-size:13px;letter-spacing:0}
    .finp:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(0,229,180,.12)}
    .finp.upper{text-transform:uppercase}
    .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txt2);cursor:pointer;font-size:14px;padding:4px;transition:color .2s}
    .toggle-pw:hover{color:var(--ac)}
    /* Buttons */
    .btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--ac),#00a88a);border:none;border-radius:7px;color:#000;font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:all .2s;position:relative;overflow:hidden}
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,229,180,.4)}
    .btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-acesso{display:none;width:100%;padding:14px;background:linear-gradient(135deg,var(--ac2),#1a7fe0);border:none;border-radius:7px;color:#fff;font-family:var(--sans);font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:10px;transition:all .2s}
    .btn-acesso:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(61,155,255,.4)}
    .btn-acesso.on{display:block}
    /* Messages */
    .msg{display:none;padding:11px 14px;border-radius:6px;font-family:var(--mono);font-size:12px;margin-bottom:18px;animation:slideIn .25s ease;line-height:1.5}
    @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .msg.err{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:#f87171}
    .msg.ok{background:rgba(0,229,180,.10);border:1px solid rgba(0,229,180,.3);color:var(--ac)}
    .msg.warn{background:rgba(243,156,18,.10);border:1px solid rgba(243,156,18,.3);color:#fbbf24}
    .msg.on{display:block}
    /* Spinner */
    .spin-wrap{display:none;align-items:center;justify-content:center;gap:10px;padding:10px 0 4px}
    .spin-wrap.on{display:flex}
    .spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--ac);border-radius:50%;animation:rot 1s linear infinite}
    @keyframes rot{to{transform:rotate(360deg)}}
    .spin-lbl{font-family:var(--mono);font-size:11px;color:var(--txt2)}
    /* Footer */
    .footer{margin-top:24px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--txt2);line-height:1.8}
    .footer span{color:var(--ac)}
  </style>
</head>
<body>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<div class="wrap">
  <div class="emblem">
    <div class="emblem-icon">📦</div>
    <div class="emblem-title">Inventário Patrimonial</div>
    <div class="emblem-unit">9º BPM · PORTO VELHO / RO</div>
    <div class="emblem-sub">CONTROLE DE PATRIMÔNIO · P4</div>
  </div>

  <div class="panel">
    <div class="status-bar">
      <div class="status-dot"></div>
      <div class="status-text">SISTEMA OPERACIONAL</div>
      <div class="status-time" id="relogio">--:--:--</div>
    </div>

    <div class="msg" id="msgBox"></div>

    <div class="spin-wrap" id="spinWrap">
      <div class="spin"></div>
      <span class="spin-lbl" id="spinLbl">AUTENTICANDO...</span>
    </div>

    <div class="fgrp">
      <label class="flbl" for="iMatricula">Matrícula</label>
      <div class="finp-wrap">
        <span class="ico">🪪</span>
        <input type="text" id="iMatricula" class="finp upper"
          placeholder="Digite sua matrícula" maxlength="20"
          autocomplete="username"
          onkeydown="if(event.key==='Enter') document.getElementById('iSenha').focus()">
      </div>
    </div>

    <div class="fgrp">
      <label class="flbl" for="iSenha">Senha</label>
      <div class="finp-wrap">
        <span class="ico">🔒</span>
        <input type="password" id="iSenha" class="finp"
          placeholder="Digite sua senha" maxlength="50"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter') fazerLogin()">
        <button class="toggle-pw" onclick="toggleSenha()" title="Mostrar/ocultar senha">👁</button>
      </div>
    </div>

    <button class="btn-login" id="btnLogin" onclick="fazerLogin()">ACESSAR SISTEMA</button>
    <button class="btn-acesso" id="btnAcesso" onclick="irParaDashboard()">▶ ENTRAR NO SISTEMA</button>
  </div>

  <div class="footer">
    Acesso restrito · Apenas pessoal autorizado<br>
    Todas as operações são <span>registradas e auditadas</span>
  </div>
</div>

<script>
  var _urlDashboard = '';

  // ── Relógio ────────────────────────────────────────────────────
  setInterval(function() {
    var a = new Date();
    document.getElementById('relogio').textContent =
      ('0'+a.getHours()).slice(-2)+':'+('0'+a.getMinutes()).slice(-2)+':'+('0'+a.getSeconds()).slice(-2);
  }, 1000);

  function toggleSenha() {
    var inp = document.getElementById('iSenha');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function showMsg(txt, tipo) {
    var el = document.getElementById('msgBox');
    el.textContent = txt;
    el.className = 'msg ' + tipo + ' on';
  }

  function setLoading(on, txt) {
    document.getElementById('spinWrap').classList.toggle('on', on);
    document.getElementById('spinLbl').textContent = txt || 'AUTENTICANDO...';
    document.getElementById('btnLogin').disabled = on;
    document.getElementById('iMatricula').disabled = on;
    document.getElementById('iSenha').disabled = on;
  }

  function irParaDashboard() {
    if (!_urlDashboard) { showMsg('✗ URL indisponível. Tente logar novamente.', 'err'); return; }
    window.location.href = _urlDashboard;
  }

  // ── Login via GAS ──────────────────────────────────────────────
  // O fluxo é: POST -> usuariosLogin -> criarHandoff -> redirecionar para dashboard.html?hk=...
  function fazerLogin() {
    var matricula = document.getElementById('iMatricula').value.trim().toUpperCase();
    var senha     = document.getElementById('iSenha').value;

    document.getElementById('msgBox').className = 'msg';
    if (!matricula) { showMsg('⚠ Informe sua matrícula.', 'warn'); return; }
    if (!senha)     { showMsg('⚠ Informe sua senha.', 'warn'); return; }

    setLoading(true, 'AUTENTICANDO...');

    // Chamada ao GAS via fetch (não usa google.script.run — estamos no GitHub Pages)
    fetch(CONFIG_INV.GAS_URL + '?acao=login', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ acao: 'login', matricula: matricula, senha: senha })
    })
    .then(function(r) { return r.json(); })
    .then(function(r) {
      if (!r.sucesso) {
        setLoading(false);
        showMsg('✗ ' + r.mensagem, 'err');
        document.getElementById('iSenha').value = '';
        document.getElementById('iSenha').focus();
        return;
      }

      // Armazena dados na sessão
      sessionStorage.setItem(CONFIG_INV.STORAGE.TOKEN,     r.token);
      sessionStorage.setItem(CONFIG_INV.STORAGE.MATRICULA, r.matricula);
      sessionStorage.setItem(CONFIG_INV.STORAGE.NOME,      r.nomeGuerra);
      sessionStorage.setItem(CONFIG_INV.STORAGE.PERFIL,    r.perfil);

      showMsg('✓ ' + r.mensagem, 'ok');
      setLoading(true, 'PREPARANDO ACESSO...');

      // Cria handoff para passar ao dashboard
      return fetch(CONFIG_INV.GAS_URL + '?acao=criarHandoff', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          acao: 'criarHandoff',
          token: r.token, matricula: r.matricula,
          nomeGuerra: r.nomeGuerra, perfil: r.perfil
        })
      });
    })
    .then(function(r) {
      if (!r) return;
      return r.json();
    })
    .then(function(r) {
      if (!r) return;
      setLoading(false);
      if (!r.handoffKey) { showMsg('✗ Falha ao preparar acesso. Tente novamente.', 'err'); return; }
      _urlDashboard = 'dashboard.html?hk=' + r.handoffKey;
      document.getElementById('btnLogin').style.display = 'none';
      var btn = document.getElementById('btnAcesso');
      btn.classList.add('on');
      btn.focus();
    })
    .catch(function(e) {
      setLoading(false);
      showMsg('✗ Erro de conexão: ' + e.message, 'err');
    });
  }

  window.addEventListener('load', function() {
    // Se já tem sessão válida, vai direto
    var tk = sessionStorage.getItem(CONFIG_INV.STORAGE.TOKEN);
    var mt = sessionStorage.getItem(CONFIG_INV.STORAGE.MATRICULA);
    if (tk && mt) {
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('iMatricula').focus();
    }
  });
</script>
</body>
</html>
